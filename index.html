<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>四則演算トレーニング</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>四則演算トレーニング</h1>

      <section id="mode-view" class="panel">
        <h2>まずは種類をえらんでね</h2>
        <div class="mode-buttons">
          <button id="mode-arithmetic" type="button">足し算・引き算</button>
          <button id="mode-multiplication" type="button">掛け算</button>
        </div>
      </section>

      <section id="level-view" class="panel hidden">
        <h2 id="level-view-title">レベルを選んでね</h2>
        <p class="description">1ラウンド10問。間違えた問題は最後に回って、正解するまで続きます。</p>
        <div id="level-grid" class="level-grid" aria-label="レベル一覧"></div>
        <button id="back-to-mode-button" type="button">種類選択に戻る</button>
      </section>

      <section id="game-view" class="hidden">
        <section class="panel info-panel">
          <p><strong>選択レベル:</strong> <span id="selected-level-label">-</span></p>
          <button id="back-button" type="button">レベル選択に戻る</button>
        </section>

        <section class="panel status" aria-live="polite">
          <p><strong>経過時間:</strong> <span id="timer">00:00</span></p>
          <p><strong>正解した問題数:</strong> <span id="solved-count">0</span> / 10</p>
          <p><strong>残り問題数:</strong> <span id="remaining-count">10</span></p>
        </section>

        <section class="panel question-area">
          <p id="question-label">「ラウンド開始」を押してください。</p>
          <form id="answer-form" autocomplete="off">
            <label for="answer-input">答え</label>
            <input id="answer-input" name="answer" type="text" inputmode="none" readonly required />
          </form>
          <div id="numpad" class="numpad" aria-label="テンキー"></div>
        </section>

        <section class="panel controls">
          <button id="start-button" type="button">ラウンド開始</button>
          <p id="feedback" aria-live="assertive"></p>
        </section>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
